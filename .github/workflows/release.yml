name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [darwin, linux, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          suffix=""
          if [ "$GOOS" = "windows" ]; then suffix=".exe"; fi
          go build \
            -ldflags="-s -w -X github.com/fabhiantomaoludyo/gws-tui/cmd.Version=${GITHUB_REF_NAME} -X github.com/fabhiantomaoludyo/gws-tui/cmd.Commit=${GITHUB_SHA} -X github.com/fabhiantomaoludyo/gws-tui/cmd.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/gws-${GOOS}-${GOARCH}${suffix}" .
      - uses: actions/upload-artifact@v4
        with:
          name: gws-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
