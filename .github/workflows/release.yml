name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [darwin, linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          binary="gws-${GOOS}-${GOARCH}"
          go build \
            -ldflags="-s -w -X github.com/fabhiansan/gws-tui/cmd.Version=${GITHUB_REF_NAME} -X github.com/fabhiansan/gws-tui/cmd.Commit=${GITHUB_SHA} -X github.com/fabhiansan/gws-tui/cmd.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/${binary}" .
          package_dir="dist/package"
          mkdir -p "$package_dir"
          cp "dist/${binary}" README.md LICENSE CHANGELOG.md "$package_dir/"
          archive="gws-${GOOS}-${GOARCH}.tar.gz"
          tar -czf "dist/${archive}" -C "$package_dir" .
          rm -rf "$package_dir" "dist/${binary}"
      - uses: actions/upload-artifact@v4
        with:
          name: gws-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
