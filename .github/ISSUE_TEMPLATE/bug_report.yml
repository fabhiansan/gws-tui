name: Bug report
description: Report a reproducible problem in gws-tui.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please redact private Workspace data, tokens,
        email addresses, message bodies, attachment URLs, and local usernames.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: List the smallest steps that trigger the issue.
      placeholder: |
        1. Run `gws tui ...`
        2. Open ...
        3. Press ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "`gws tui --version` output or commit SHA"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: terminal
    attributes:
      label: Terminal
      placeholder: "Kitty, WezTerm, iTerm2, Terminal.app, Alacritty, etc."
  - type: dropdown
    id: daemon
    attributes:
      label: Daemon Mode
      options:
        - "No"
        - "Yes"
        - "Not sure"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: Redact private data before attaching logs or screenshots.
      render: text
